version: 1.6.3

# Debug level (0-3)
# 0 = Severe only
# 1 = Warn and above
# 2 = Info and above
# 3 = Debug and above
debug: 1

# Module configurations
modules:
  item-library:
    enabled: true
    shared-storage: true  # When true, all plugins share the same item storage
    shared-file: "shared_items.yml"  # The filename for shared storage
    # Add any future item-library specific configurations here
  
  gui:
    enabled: true
    shared-storage: false  # When true, all plugins share the same GUI configurations
    shared-file: "shared_guis.yml"  # The filename for shared GUI storage
    # Add any future GUI-specific configurations here
  
  itemedit:
    enabled: true  # Enable ItemEdit integration if available
  
  custom-items:
    enabled: true  # Enable unified custom item manager (itemedit:<id>, internal:<id>, MATERIAL)

  sounds:
    enabled: true  # Enable SoundHelper module
    # Preset sounds for common UI feedback
    # Format: "SOUND_NAME:volume:pitch" or verbose YAML
    presets:
      success: "ENTITY_PLAYER_LEVELUP:1.0:1.2"
      error: "ENTITY_VILLAGER_NO:1.0:0.8"
      click: "UI_BUTTON_CLICK:0.5:1.0"
      ding: "ENTITY_EXPERIENCE_ORB_PICKUP:1.0:1.2"